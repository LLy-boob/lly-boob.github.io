    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;

      }
      html,
      body {
        width: 100%;

        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      :root {
        --ad-banner-height: 180px;
        --phase-color: #00ffff;
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.15);

          --ad-banner-height: 70px;

      @media (max-width: 500px) {

          --ad-banner-height: 120px;
        }
      }
      body {
        background: linear-gradient(
          135deg,
          #0a0a1a 0%,
          #1a1a2e 30%,
          #16213e 70%,
          #0f0f23 100%

        color: white;
        font-family: "Orbitron", monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        transition: background 0.7s;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)

        0%,

          border-color: var(--phase-color);

          box-shadow:

          transform: scale(1.005);
        }

        transition: opacity 0.2s;

        opacity: 0.12;

        box-shadow: 0 0 var(--glow-intensity) var(--phase-color);
        animation: boardPulse var(--pulse-speed) infinite ease-in-out;
        transition: all 0.5s ease;
        z-index: 1;
        position: relative;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        -ms-interpolation-mode: nearest-neighbor;
        transform: translateZ(0);
        will-change: transform;
      }
      @media (max-height: 500px) and (orientation: landscape) {
        #pong {
          max-height: calc(100vh - var(--ad-banner-height) - 60px);
          width: auto;
          margin: 0 auto;
        }
      }

        border-width: 2px;
      }

            var(--phase-color),
            #fff,
            var(--phase-color)
          )
          1;
      }
      #pong.tier-powered::after {
        content: "";
        position: absolute;
        inset: -5px;
        border: 2px solid transparent;
        border-radius: 20px;
        background: linear-gradient(
            90deg,
            transparent,
            var(--phase-color),
            transparent

        pointer-events: none;
      }
      #pong.tier-overdrive {
        animation: boardPulse 0.5s infinite ease-in-out;

      }

          inset 0 0 40px var(--phase-color);
        background: rgba(0, 0, 0, 0.4);
      }
      #pong.danger {
        animation: dangerPulse 0.4s infinite !important;
      }

        position: fixed;

        font-size: 0.8em;
        color: #fff;

        align-items: center;

        background: rgba(255, 255, 255, 0.1);

      @media (max-width: 768px) {
        .touch-controls {
          display: block;
        }
      }
      .hud-pip {
        width: clamp(10px, 2.5vw, 15px);
        height: clamp(10px, 2.5vw, 15px);
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .hud-pip.active {
        background: var(--phase-color);
        border-color: #fff;
        box-shadow:
          0 0 10px var(--phase-color),
          0 0 20px var(--phase-color);
      }

        0% {
          transform: scale(0.1);
          opacity: 0;
          filter: brightness(2);

        40% {
          transform: scale(1.6);

          filter: brightness(2);
          box-shadow: 0 0 30px #fff;
        }
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
      }

        animation: lifeUnlock 0.7s cubic-bezier(0.25, 1, 0.25, 1) forwards;
      }

        position: absolute;
        width: clamp(80px, 20vw, 100px);
        height: clamp(80px, 20vw, 100px);

        border-radius: 50%;

      }

      }
      function getVerdict(p) {
        if (p <= 5) return "NEON NOVICE";
        if (p <= 15) return "GRID RUNNER";
        if (p <= 35) return "PULSE WARRIOR";
        if (p <= 70) return "OVERDRIVE ELITE";
        if (p <= 120) return "QUANTUM MASTER";
        return "PINGZERO LEGEND";
      }
      function endGame(titleStr) {
        gameover = true;
        paused = true;
        document.querySelector(".go-glitch").innerText = titleStr;
        if (twoPlayer) {
          document.getElementById("go-phase").innerText = "N/A";
          document.getElementById("go-score").innerText = p1 + " - " + p2;
          document.getElementById("go-verdict").innerText = "MULTIPLAYER MATCH";
        } else {
          document.getElementById("go-phase").innerText = phase;
          document.getElementById("go-score").innerText = p1;
          document.getElementById("go-verdict").innerText = getVerdict(phase);
        }
        gameMusic.stop();
        if (soundOn) {
          playGameOver();
        }
        const block = Math.min(Math.floor((phase - 1) / 12), 9);
        const phaseCol = phaseColors[block];
        gameoverDiv.style.display = "block";
        powerupEl.style.display = "none";
        Ads.show("gameover");
        if (p1 > highScore) {
          highScore = p1;
          localStorage.setItem("pongHighScore", highScore);
        }
        document.getElementById("go-high").innerText = highScore;
      }
      function resetGame() {
        p1 = 0;
        p2 = 0;
        p1El.innerText = 0;
        p2El.innerText = 0;
        phase = 1;
        nextTarget = MILESTONE;
        paddleSpeed = 11;
        aiBase = 0.12;
        aiErrorBase = 45;
        playerY = canvas.height / 2 - PH / 2;
        aiY = canvas.height / 2 - PH / 2;
        player2Y = canvas.height / 2 - PH / 2;
        ball = newBall(true);
        trail = [];
        deactivatePower();
        gameover = false;
        paused = false;
        gameoverDiv.style.display = "none";
        updatePhaseTheme();
        Ads.reset();
        gameMusic.setPhase(1);
        gameMusic.masterGain.gain.setValueAtTime(
          0.14,
          gameMusic.ctx.currentTime,
        );
        gameMusic.stop();
        if (soundOn && gameMusic.ctx) {
          setTimeout(function () {
            gameMusic.start();
          }, 100);
        }
      }
      window.addEventListener("keydown", function (e) {
        if (e.repeat) return;
        if (e.key === "ArrowUp") {
          up = true;
          e.preventDefault();
        }
        if (e.key === "ArrowDown") {
          down = true;
          e.preventDefault();
        }
        if (e.key === "w" || e.key === "W") {
          wPressed = true;
          e.preventDefault();
        }
        if (e.key === "s" || e.key === "S") {
          sPressed = true;
          e.preventDefault();
        }
        if (e.key === " ") {
          e.preventDefault();
          if (gameover) return;
          if (paused) {
            paused = false;
            pauseBtn.style.display = "";
            resumeBtn.style.display = "none";
            if (soundOn && gameMusic.ctx) gameMusic.start();
          } else {
            paused = true;
            pauseBtn.style.display = "none";
            resumeBtn.style.display = "";
            gameMusic.stop();
            Ads.show("pause");
          }
        }
      });
      document
        .getElementById("retryBtn")
        .addEventListener("click", function () {
          Ads.show("playagain");
          resetGame();
        });
      window.addEventListener("keyup", function (e) {
        if (e.key === "ArrowUp") {
          up = false;
          e.preventDefault();
        }
        if (e.key === "ArrowDown") {
          down = false;
          e.preventDefault();
        }
        if (e.key === "w" || e.key === "W") {
          wPressed = false;
          e.preventDefault();
        }
        if (e.key === "s" || e.key === "S") {
          sPressed = false;
          e.preventDefault();
        }
      });
      let touchActive = false;
      let touchThrottle = false;
      canvas.addEventListener("touchstart", function (e) {
        e.preventDefault();
        if (touchThrottle) return;
        touchThrottle = true;
        const rect = canvas.getBoundingClientRect();
        const x =
          (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
        if (x < canvas.width / 2.5) {
          touchActive = true;
          const y =
            (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
          playerY = Math.max(
            0,
            Math.min(canvas.height - PH * shortMod, y - (PH * shortMod) / 2),
          );
        }
        setTimeout(function () {
          touchThrottle = false;
        }, 50);
      });
      canvas.addEventListener("touchmove", function (e) {
        e.preventDefault();
        if (touchActive) {
          const rect = canvas.getBoundingClientRect();
          const y =
            (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
          playerY = Math.max(
            0,
            Math.min(canvas.height - PH * shortMod, y - (PH * shortMod) / 2),
          );
        }
      });
      canvas.addEventListener("touchend", function () {
        touchActive = false;
      });
      canvas.addEventListener("touchcancel", function () {
        touchActive = false;
      });
      shelfTrigger.onclick = function () {
        settingsShelf.classList.toggle("open");
        shelfTrigger.classList.toggle("active");
      };
      pauseBtn.onclick = function () {
        paused = true;
        pauseBtn.style.display = "none";
        resumeBtn.style.display = "";
        gameMusic.stop();
        Ads.show("pause");
      };
      resumeBtn.onclick = function () {
        if (!gameover) {
          paused = false;
          pauseBtn.style.display = "";
          resumeBtn.style.display = "none";
          if (soundOn && gameMusic.ctx) gameMusic.start();
        }
      };
      resetBtn.onclick = resetGame;
      modeBtn.onclick = function () {
        twoPlayer = !twoPlayer;
        modeBtn.innerText = `👤 2P: ${twoPlayer ? "On" : "Off"}`;
      };
      soundBtn.onclick = function () {
        soundOn = !soundOn;
        soundBtn.innerText = `${soundOn ? "🔊" : "🔇"} Sound: ${soundOn ? "On" : "Off"}`;
        if (!soundOn) {
          gameMusic.stop();
        } else if (!gameover && !paused && gameMusic.ctx) {
          gameMusic.start();
        }
      };
      themeBtn.onclick = function () {
        light = !light;
        document.body.classList.toggle("light", light);
        themeBtn.innerText = `🌓 Theme: ${light ? "Light" : "Dark"}`;
        const reminder = document.querySelector(".endless-search-reminder");
        if (reminder) {
          reminder.style.background = light
            ? "rgba(255,255,255,0.85)"
            : "rgba(10,20,30,0.85)";
          reminder.style.color = light ? "#000" : "#fff";
        }
      };
      const upArrow = document.getElementById("upArrow");
      const downArrow = document.getElementById("downArrow");
      let upInt, downInt;
      function pressUp() {
        up = true;
        upArrow.classList.add("active");
        if (navigator.vibrate) navigator.vibrate(6);
        clearInterval(upInt);
        upInt = setInterval(function () {
          playerY = Math.max(0, playerY - paddleSpeed * 1.2);
        }, 16);
      }
      function releaseUp() {
        up = false;
        upArrow.classList.remove("active");
        clearInterval(upInt);
      }
      function pressDown() {
        down = true;
        downArrow.classList.add("active");
        if (navigator.vibrate) navigator.vibrate(6);
        clearInterval(downInt);
        downInt = setInterval(function () {
          playerY = Math.min(
            canvas.height - PH * shortMod,
            playerY + paddleSpeed * 1.2,
          );
        }, 16);
      }
      function releaseDown() {
        down = false;
        downArrow.classList.remove("active");
        clearInterval(downInt);
      }
      var events = ["pointerdown", "touchstart", "mousedown"];
      for (var i = 0; i < events.length; i++) {
        upArrow.addEventListener(events[i], function (e) {
          e.preventDefault();
          pressUp();
        });
        downArrow.addEventListener(events[i], function (e) {
          e.preventDefault();
          pressDown();
        });
      }
      var eventsEnd = [
        "pointerup",
        "pointercancel",
        "pointerleave",
        "touchend",
        "touchcancel",
        "mouseup",
        "mouseleave",
      ];
      for (var i = 0; i < eventsEnd.length; i++) {
        upArrow.addEventListener(eventsEnd[i], function (e) {
          e.preventDefault();
          releaseUp();
        });
        downArrow.addEventListener(eventsEnd[i], function (e) {
          e.preventDefault();
          releaseDown();
        });
      }
      upArrow.addEventListener("contextmenu", function (e) {
        e.preventDefault();
      });
      downArrow.addEventListener("contextmenu", function (e) {
        e.preventDefault();
      });
      updatePhaseTheme();
      ball = newBall(true);
      let frameSkip = 0;
      const FRAME_SKIP_MAX = 1;
      const TARGET_INTERVAL = lowEnd ? 1000 / 30 : 0;
      let lastFrameTime = 0;
      function gameLoop(timestamp) {
        if (lowEnd && timestamp - lastFrameTime < TARGET_INTERVAL) {
          requestAnimationFrame(gameLoop);
          return;
        }
        lastFrameTime = timestamp;
        if (!paused && !gameover) {
          frameSkip = (frameSkip + 1) % FRAME_SKIP_MAX;
          if (frameSkip === 0) {
            update();
          }
        }
        let sx = 0,
          sy = 0;
        if (shakeTime > 0) {
          if (!lowEnd) {
            sx = (Math.random() - 0.5) * 12;
            sy = (Math.random() - 0.5) * 12;
          }
          shakeTime--;
        }
        ctx.save();
        ctx.translate(sx, sy);
        draw();
        if (flashTime > 0) {
          ctx.fillStyle = flashColor + "22";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          flashTime--;
        }
        ctx.restore();
        requestAnimationFrame(gameLoop);
      }
      gameLoop(0);
      let deferredInstallPrompt = null;
      const installBanner = document.getElementById("install-banner");
      const installBtn = document.getElementById("install-btn");
      const installDismiss = document.getElementById("install-dismiss");
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        deferredInstallPrompt = e;
        setTimeout(function () {
          if (deferredInstallPrompt) {
            installBanner.style.display = "flex";
          }
        }, 5000);
      });
      installBtn.addEventListener("click", async function () {
        if (!deferredInstallPrompt) return;
        installBanner.style.display = "none";
        deferredInstallPrompt.prompt();
        const { outcome } = await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
      });
      installDismiss.addEventListener("click", function () {
        installBanner.style.display = "none";
        deferredInstallPrompt = null;
      });
      window.addEventListener("appinstalled", function () {
        installBanner.style.display = "none";
        deferredInstallPrompt = null;
      });
    </script>
  </body>
</html>
