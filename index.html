  class GameMusic {
    constructor() {
      this.ctx = null;
      this.masterGain = null;
      this.compressor = null;
      this.isPlaying = false;
      this.phase = 1;
      this.timer = null;
      this.isUserActivated = false;
    }

    initOnUserGesture() {
      if (!this.ctx) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.15;
        
        this.compressor = this.ctx.createDynamicsCompressor();
        this.compressor.threshold.value = -24;
        this.compressor.knee.value = 30;
        this.compressor.ratio.value = 12;
        this.compressor.attack.value = 0.003;
        this.compressor.release.value = 0.25;
        
        this.masterGain.connect(this.compressor);
        this.compressor.connect(this.ctx.destination);
      }
      
      if (this.ctx.state === 'suspended') {
        this.ctx.resume();
      }
      this.isUserActivated = true;
    }

    start() {
      if (!soundOn || this.isPlaying) return;
      
      if (!this.ctx) {
        this.initOnUserGesture();
      }
      
      this.isPlaying = true;
      
      if (this.ctx.state !== 'running') {
        return;
      }
      
      this.playArpeggio();
    }

    stop() {
      this.isPlaying = false;
      if (this.timer) clearTimeout(this.timer);
    }

    playArpeggio() {
      if (!this.isPlaying || !this.ctx || this.ctx.state !== 'running') return;
      
      const baseFreq = 220 + (this.phase * 3);
      
      const notes = [
        baseFreq,
        baseFreq * 1.122,
        baseFreq * 1.3348,
        baseFreq * 1.4983,
        baseFreq * 2.0
      ];
      
      let noteIndex = 0;
      
      const playNote = () => {
        if (!this.isPlaying || !this.ctx || this.ctx.state !== 'running') return;
        
        const now = this.ctx.currentTime;
        
        const osc = this.ctx.createOscillator();
        const noteGain = this.ctx.createGain();
        
        if (this.phase < 3) osc.type = 'sine';
        else if (this.phase < 6) osc.type = 'triangle';
        else if (this.phase < 9) osc.type = 'square';
        else osc.type = 'sawtooth';
        
        osc.frequency.value = notes[noteIndex];
        
        noteGain.gain.setValueAtTime(0.0001, now);
        noteGain.gain.exponentialRampToValueAtTime(0.08, now + 0.015);
        
        osc.connect(noteGain);
        noteGain.connect(this.masterGain);
        
        const stopTime = now + 0.18;
        noteGain.gain.exponentialRampToValueAtTime(0.0001, stopTime);
        
        osc.start(now);
        osc.stop(stopTime + 0.01);
        
        noteIndex = (noteIndex + 1) % notes.length;
        
        const speed = Math.max(140, 300 - this.phase * 5);
        this.timer = setTimeout(playNote, speed);
        
        setTimeout(() => {
          try {
            osc.disconnect();
            noteGain.disconnect();
          } catch(e) {}
        }, 250);
      };
      
      playNote();
    }
    
    setPhase(phase) {

      if (this.masterGain && this.ctx) {

        this.masterGain.gain.exponentialRampToValueAtTime(0.15, now + 0.15);
      }
    }
  }

    'linear-gradient(135deg, #0a1a2a 0%, #2a5e7e 50%, #1a4a6a 100%)',
    'linear-gradient(135deg, #2a0a1a 0%, #5e2a4a 50%, #4e1a3a 100%)',
    'linear-gradient(135deg, #1a0a2a 0%, #3a2a6a 50%, #2a1a5a 100%)',
    'linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%)',
    'linear-gradient(135deg, #2a1a0a 0%, #7e5e2a 50%, #d7a03a 100%)'
  ];
  
  const Ads = {
    shown: 0,
    maxPerSession: 1,
    last: 0,
    minInterval: 180000,
    
    canShow: function() {
      const now = Date.now();
      if (this.shown >= this.maxPerSession) return false;
      if (now - this.last < this.minInterval) return false;
      return true;
    },
    
    show: function(reason) {
      if (!this.canShow()) return;
      let delay = 3000;
      if (reason === 'gameover') delay = 4000;
      setTimeout(function() {
        if (!paused && !gameover) {
          let wasPaused = paused;
          if (!wasPaused) paused = true;
          if (window.monetagInterstitial && window.monetagInterstitial.show) {
            try {
              window.monetagInterstitial.show();
              this.shown++;
              this.last = Date.now();
            } catch (e) {}
          }
          setTimeout(function() {
            if (!wasPaused && !gameover) paused = false;
          }, 500);
        }
      }, delay);
    },
    
    reset: function() {
      this.shown = 0;
      this.last = 0;
    }
  };
  
  function deathLead() {
    return 2 * (Math.floor((phase - 1) / 12) + 1);
  }
  
  function updatePhaseTheme() {
    const b = Math.min(Math.floor((phase - 1) / 12), 9);
    const col = phaseColors[b];
    
    requestAnimationFrame(function() {
      document.body.style.background = phaseBgs[b];
      canvas.style.borderColor = col;
      canvas.style.boxShadow = `0 0 30px ${col}`;
      document.getElementById('scoreboard').style.textShadow = `0 0 10px ${col}, 0 0 20px ${col}`;
    });
    
    const fx = document.createElement('div');
    fx.style.cssText = `position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, ${col}20 0%, transparent 70%); pointer-events:none; z-index:9999; opacity:0; animation:fadeOut 1.6s ease-out forwards;`;
    
    const lbl = document.createElement('div');
    lbl.innerText = phaseNames[b];
    lbl.style.cssText = `
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: ${window.innerWidth < 600 ? '2.2em' : '4em'};
      font-weight: 900;
      color: ${col};
      text-shadow: 0 0 20px ${col}, 0 0 40px ${col}, 0 0 80px ${col};
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      animation: namePulse 2.2s ease-out forwards;
      white-space: nowrap;
      font-family: 'Orbitron', sans-serif;
    `;
    fx.appendChild(lbl);
    
    const sub = document.createElement('div');
    sub.innerText = '⚡ ENDLESS PONG ⚡';
    sub.style.cssText = `
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: ${window.innerWidth < 600 ? '1em' : '1.6em'};
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 0 15px ${col}, 0 0 30px ${col};
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      animation: namePulse 2.2s ease-out forwards;
      animation-delay: 0.15s;
      white-space: nowrap;
      font-family: 'Orbitron', sans-serif;
      border-top: 1px solid rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding: 8px 0;
    `;
    fx.appendChild(sub);
    
    document.body.appendChild(fx);
    setTimeout(function() { fx.remove(); }, 2500);
  }
  
  function newBall(serveLeft) {
    if (serveLeft === undefined) serveLeft = true;
    let ang = (Math.random() * 0.4 - 0.2) * Math.PI;
    let sp = 11.5 + (phase - 1) * 0.15;
    let dir = serveLeft ? 1 : -1;
    if (!serveLeft && (p1 - p2 > 5)) {
      ang = (Math.random() * 0.6 - 0.3) * Math.PI;
      sp *= 1.15;
    }
    return {
      x: canvas.width/2,
      y: canvas.height/2,
      vx: dir * (sp * Math.cos(ang)),
      vy: sp * Math.sin(ang),
      spin: 0,
      radius: BALL_RADIUS,
      turbo: false
    };
  }
  
  function spawnPower() {
    if (activePower || powerItem) return;
    const px = Math.random() * (canvas.width * 0.6) + canvas.width * 0.2;
    const py = Math.random() * (canvas.height * 0.7) + canvas.height * 0.15;
    const available = [];
    for (let i = 0; i < powerTypes.length; i++) {
      if (!activePower || powerTypes[i].type !== activePower.type) {
        available.push(powerTypes[i]);
      }
    }
    const p = available[Math.floor(Math.random() * available.length)];
    powerItem = { ...p, x: px, y: py, r: 22 };
    if (powerTimeout) clearTimeout(powerTimeout);
    powerTimeout = setTimeout(function() { powerItem = null; }, 9000);
  }
  
  function collectPower() {
    if (!powerItem) return;
    const dx = ball.x - powerItem.x;
    const dy = ball.y - powerItem.y;
    if (Math.hypot(dx, dy) < ball.radius + powerItem.r) {
      for (let i = 0; i < powerTypes.length; i++) {
        if (powerTypes[i].type === powerItem.type) {
          activePower = powerTypes[i];
          break;
        }
      }
      powerTimer = activePower.dur * 60;
      powerupEl.innerText = activePower.label;
      powerupEl.style.display = 'block';
      if (soundOn) { playPowerup(); }
      if (powerItem.type === 'big-ball') {
        ball.radius = BALL_RADIUS * 1.7;
      } else if (powerItem.type === 'fast-ball') {
        ball.vx *= 1.45;
        ball.vy *= 1.45;
        ball.turbo = true;
      } else if (powerItem.type === 'small-paddle') {
        shortMod = 0.55;
      } else if (powerItem.type === 'wide-paddle') {
        wideMod = 1.7;
      }
      powerItem = null;
      clearTimeout(powerTimeout);
    }
  }
  
  function deactivatePower() {
    ball.radius = BALL_RADIUS;
    ball.turbo = false;
    wideMod = 1;
    shortMod = 1;
    activePower = null;
    powerupEl.style.display = 'none';
  }
  
  function phaseUp() {
    if (phase < MAX_PHASE) phase++;
    nextTarget += MILESTONE;
    aiBase = Math.min(0.5, aiBase + 0.01);
    paddleSpeed += 0.2;
    updatePhaseTheme();
    Ads.show('phase');
    gameMusic.setPhase(phase);
    if (soundOn) { playPhaseUp(); }
  }
  
  function drawNet() {
    ctx.beginPath();
    ctx.strokeStyle = '#fff7';
    ctx.lineWidth = 4;
    ctx.setLineDash([20, 20]);
    ctx.moveTo(canvas.width/2, 0);
    ctx.lineTo(canvas.width/2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  function drawTrail() {
    for (let i = trail.length - 1; i >= 0; i--) {
      const t = trail[i];
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.radius * (i+1) / (TRAIL_MAX+4), 0, Math.PI*2);
      ctx.fillStyle = `rgba(150,255,255,${(i+1)/(TRAIL_MAX+7)})`;
      ctx.fill();
    }
  }
  
  function drawPowerup() {
    if (!powerItem) return;
    ctx.shadowBlur = 30;
    ctx.shadowColor = powerItem.color;
    ctx.beginPath();
    ctx.arc(powerItem.x, powerItem.y, powerItem.r, 0, Math.PI*2);
    ctx.fillStyle = powerItem.color;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = 'bold 1.2em Orbitron';
    ctx.fillStyle = '#222';
    ctx.textAlign = 'center';
    ctx.fillText(powerItem.label, powerItem.x, powerItem.y + 6);
  }
  
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = light ? '#e1ecf4' : '#1e2a36';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawNet();
    
    if (!light) drawTrail();
    
    drawPowerup();
    
    const block = Math.min(Math.floor((phase-1)/12), 9);
    const phaseCol = phaseColors[block];
    
    ctx.shadowBlur = 10;
    ctx.shadowColor = phaseCol;
    
    ctx.fillStyle = light ? '#333' : phaseCol;
    ctx.fillRect(18, playerY, PW * wideMod, PH * shortMod);
    
    const rightY = twoPlayer ? player2Y : aiY;
    ctx.shadowColor = '#ff0';
    ctx.fillStyle = light ? '#666' : '#ff0';
    ctx.fillRect(canvas.width - 18 - PW * wideMod, rightY, PW * wideMod, PH * shortMod);
    
    ctx.shadowBlur = ball.turbo ? 24 : 10;
    ctx.shadowColor = ball.turbo ? phaseCol : '#0ff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.shadowBlur = 0;
    
    ctx.font = 'bold 56px Arial';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(p1, canvas.width/2 - 90, 80);
    ctx.fillText(p2, canvas.width/2 + 90, 80);
    
    ctx.font = 'bold 28px Arial';
    ctx.strokeStyle = '#fff6';
    ctx.lineWidth = 3;
    ctx.strokeText(`Phase ${phase}`, canvas.width/2, 110);
    ctx.fillStyle = phase >= MAX_PHASE ? '#ff8a8a' : '#8aff8a';
    ctx.fillText(`Phase ${phase}`, canvas.width/2, 110);
    
    ctx.font = 'bold 18px Arial';
    ctx.fillStyle = phaseCol;
    ctx.fillText(phaseNames[block], canvas.width/2, 142);
    
    if (!twoPlayer) {
      ctx.font = 'bold 16px Arial';
      ctx.fillStyle = '#ffb3b3';
      ctx.fillText(`Computer +${deathLead()} lose`, canvas.width/2, 172);
    }
    
    if (activePower) {
      ctx.font = 'bold 1.8em Arial';
      ctx.fillStyle = '#ffe15e';
      ctx.fillText(`${activePower.label} ${Math.ceil(powerTimer/60)}s`, canvas.width/2, 45);
    }
    
    ctx.save();
    ctx.font = '600 16px Orbitron';
    ctx.fillStyle = light ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.85)';
    ctx.textAlign = 'right';
    ctx.fillText('⏣ ENDLESS PONG ⏣', canvas.width - 25, canvas.height - 25);
    ctx.restore();
    ctx.textAlign = 'left';
  }
  
  function update() {
    if (paused || gameover) return;
    
    if (up) playerY -= paddleSpeed * 1.25;
    if (down) playerY += paddleSpeed * 1.25;
    playerY = Math.max(0, Math.min(canvas.height - PH * shortMod, playerY));
    
    if (twoPlayer) {
      if (wPressed) player2Y -= paddleSpeed;
      if (sPressed) player2Y += paddleSpeed;
      player2Y = Math.max(0, Math.min(canvas.height - PH * shortMod, player2Y));
    } else {
      const aiCenter = aiY + (PH * shortMod)/2;
      const diff = p1 - p2;
      let aggro = aiBase;
      if (diff > 8) aggro *= 1.6;
      else if (diff > 5) aggro *= 1.4;
      else if (diff > 2) aggro *= 1.2;
      else if (diff < -8) aggro *= 0.8;
      let target = ball.y + (Math.random() - 0.5) * 20;
      aiY += (target - aiCenter) * aggro;
      aiY = Math.max(0, Math.min(canvas.height - PH * shortMod, aiY));
    }
    
    ball.x += ball.vx;
    ball.y += ball.vy + ball.spin;
    
    trail.push({x: ball.x, y: ball.y});
    if (trail.length > TRAIL_MAX) trail.shift();
    
    if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
      ball.vy = -ball.vy;
      ball.spin = -ball.spin * 0.7;
      if (soundOn) { playBeep(); }
      ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
    }
    
    if (ball.x - ball.radius < 18 + PW * wideMod &&
        ball.y > playerY && ball.y < playerY + PH * shortMod) {
      if (soundOn) { playBeep(); }
      const rel = (ball.y - (playerY + (PH * shortMod)/2)) / ((PH * shortMod)/2);
      const move = (up ? -1 : 0) + (down ? 1 : 0);
      ball.spin = Math.max(-3, Math.min(3, move + rel * 2));
      const angle = rel * (Math.PI / 2.5);
      let speed = Math.min(18 + phase * 0.6, Math.hypot(ball.vx, ball.vy) * 1.08 + 0.4);
      ball.vx = Math.abs(speed * Math.cos(angle));
      ball.vy = speed * Math.sin(angle);
      ball.x = 18 + PW * wideMod + ball.radius;
    }
    
    const rightY = twoPlayer ? player2Y : aiY;
    if (ball.x + ball.radius > canvas.width - 18 - PW * wideMod &&
        ball.y > rightY && ball.y < rightY + PH * shortMod) {
      if (soundOn) { playBeep(); }
      const rel = (ball.y - (rightY + (PH * shortMod)/2)) / ((PH * shortMod)/2);
      const move = twoPlayer ? ((wPressed ? -1 : 0)+(sPressed ? 1 : 0)) : ((aiY - rightY)/8);
      ball.spin = Math.max(-3, Math.min(3, move + rel * 2));
      const angle = rel * (Math.PI / 2.5);
      let speed = Math.min(18 + phase * 0.6, Math.hypot(ball.vx, ball.vy) * 1.08 + 0.4);
      ball.vx = -Math.abs(speed * Math.cos(angle));
      ball.vy = speed * Math.sin(angle);
      ball.x = canvas.width - 18 - PW * wideMod - ball.radius;
    }
    
    collectPower();
    
    if (ball.x - ball.radius < 0) {
      p2++;
      p2El.innerText = p2;
      if (soundOn) { playScore(); }
      ball = newBall(false);
      trail = [];
      deactivatePower();
      if (twoPlayer) {
        if (p2 - p1 >= MILESTONE) endGame('Player 2');
      } else {
        if (p2 - p1 >= deathLead()) endGame('Computer');
      }
    }
    
    if (ball.x + ball.radius > canvas.width) {
      p1++;
      p1El.innerText = p1;
      if (soundOn) { playScore(); }
      ball = newBall(true);
      trail = [];
      deactivatePower();
      if (twoPlayer) {
        if (p1 - p2 >= MILESTONE) endGame('Player 1');
      } else {
        if (p1 >= nextTarget) phaseUp();
      }
    }
    
    if (!activePower && !powerItem && Math.random() < 0.0025) spawnPower();
    if (activePower) { 
      powerTimer--; 
      if (powerTimer <= 0) deactivatePower(); 
    }
  }
  
  function endGame(winner) {
    gameover = true;
    paused = true;
    winnerEl.innerText = twoPlayer ? winner + ' Wins!' : 'You Lose...';
    
    gameMusic.stop();
    
    if (soundOn) { playGameOver(); }
    
    const existing = document.querySelector('.endless-search-reminder');
    if (existing) existing.remove();
    
    const block = Math.min(Math.floor((phase-1)/12), 9);
    const phaseCol = phaseColors[block];
    
    const searchPanel = document.createElement('div');
    searchPanel.className = 'endless-search-reminder';
    searchPanel.style.cssText = `
      background: ${light ? 'rgba(255,255,255,0.85)' : 'rgba(10,20,30,0.85)'};
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid ${phaseCol};
      border-radius: 50px;
      padding: 14px 24px;
      margin: 25px auto 20px auto;
      display: inline-block;
      box-shadow: 0 0 25px ${phaseCol};
      color: ${light ? '#000' : '#fff'};
      font-family: 'Orbitron', monospace;
      font-size: ${window.innerWidth < 600 ? '14px' : '18px'};
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      width: fit-content;
      max-width: 90%;
    `;
    searchPanel.innerHTML = `
      <span style="font-size:1.3em; margin-right:10px;">🔍</span>
      <span style="border-right:1px solid ${phaseCol}; padding-right:15px; margin-right:15px;">ENDLESS PONG</span>
      <span style="font-weight:300;">on Google</span>
    `;
    
    winnerEl.parentNode.insertBefore(searchPanel, winnerEl.nextSibling);
    
    gameoverDiv.style.display = 'block';
    powerupEl.style.display = 'none';
    Ads.show('gameover');
    
    if (p1 > highScore) {
      highScore = p1;
      localStorage.setItem('pongHighScore', highScore);
    }
  }
  
  function resetGame() {
    p1 = 0;
    p2 = 0;
    p1El.innerText = 0;
    p2El.innerText = 0;
    phase = 1;
    nextTarget = MILESTONE;
    paddleSpeed = 11;
    aiBase = 0.12;
    playerY = canvas.height/2 - PH/2;
    aiY = canvas.height/2 - PH/2;
    player2Y = canvas.height/2 - PH/2;
    ball = newBall(true);
    trail = [];
    deactivatePower();
    gameover = false;
    paused = false;
    gameoverDiv.style.display = 'none';
    updatePhaseTheme();
    Ads.reset();
    
    gameMusic.setPhase(1);
    gameMusic.stop();
    if (soundOn && gameMusic.ctx) {
      setTimeout(function() { gameMusic.start(); }, 100);
    }
  }
  
  window.addEventListener('keydown', function(e) {
    if (e.repeat) return;
    if (e.key === 'ArrowUp') { up = true; e.preventDefault(); }
    if (e.key === 'ArrowDown') { down = true; e.preventDefault(); }
    if (e.key === 'w' || e.key === 'W') { wPressed = true; e.preventDefault(); }
    if (e.key === 's' || e.key === 'S') { sPressed = true; e.preventDefault(); }
    if (e.key === ' ') {
      e.preventDefault();
      if (gameover) return;
      if (paused) {
        paused = false;
        pauseBtn.style.display = '';
        resumeBtn.style.display = 'none';
        if (soundOn && gameMusic.ctx) gameMusic.start();
      } else {
        paused = true;
        pauseBtn.style.display = 'none';
        resumeBtn.style.display = '';
        gameMusic.stop();
      }
    }
  });
  
  window.addEventListener('keyup', function(e) {
    if (e.key === 'ArrowUp') { up = false; e.preventDefault(); }
    if (e.key === 'ArrowDown') { down = false; e.preventDefault(); }
    if (e.key === 'w' || e.key === 'W') { wPressed = false; e.preventDefault(); }
    if (e.key === 's' || e.key === 'S') { sPressed = false; e.preventDefault(); }
  });
  
  let touchActive = false;
  let touchThrottle = false;
  
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (touchThrottle) return;
    touchThrottle = true;
    
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    if (x < canvas.width / 2.5) {
      touchActive = true;
      const y = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
      playerY = Math.max(0, Math.min(canvas.height - PH * shortMod, y - (PH * shortMod)/2));
    }
    
    setTimeout(function() { touchThrottle = false; }, 50);
  });
  
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (touchActive) {
      const rect = canvas.getBoundingClientRect();
      const y = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
      playerY = Math.max(0, Math.min(canvas.height - PH * shortMod, y - (PH * shortMod)/2));
    }
  });
  
  canvas.addEventListener('touchend', function() { touchActive = false; });
  canvas.addEventListener('touchcancel', function() { touchActive = false; });
  
  pauseBtn.onclick = function() {
    paused = true;
    pauseBtn.style.display = 'none';
    resumeBtn.style.display = '';
    gameMusic.stop();
  };
  
  resumeBtn.onclick = function() {
    if (!gameover) {
      paused = false;
      pauseBtn.style.display = '';
      resumeBtn.style.display = 'none';
      if (soundOn && gameMusic.ctx) gameMusic.start();
    }
  };
  
  resetBtn.onclick = resetGame;
  
  document.querySelector('#gameover button').addEventListener('click', function() {
    Ads.show('playagain');
    resetGame();
  });
  
  modeBtn.onclick = function() {
    twoPlayer = !twoPlayer;
    modeBtn.innerText = `2P: ${twoPlayer ? 'On' : 'Off'}`;
  };
  
  soundBtn.onclick = function() {
    soundOn = !soundOn;
    soundBtn.innerText = `Sound: ${soundOn ? 'On' : 'Off'}`;
    if (!soundOn) {
      gameMusic.stop();
    } else if (!gameover && !paused && gameMusic.ctx) {
      gameMusic.start();
    }
  };
  
  themeBtn.onclick = function() {
    light = !light;
    document.body.classList.toggle('light', light);
    themeBtn.innerText = `Theme: ${light ? 'Light' : 'Dark'}`;
    const reminder = document.querySelector('.endless-search-reminder');
    if (reminder) {
      reminder.style.background = light ? 'rgba(255,255,255,0.85)' : 'rgba(10,20,30,0.85)';
      reminder.style.color = light ? '#000' : '#fff';
    }
  };
  
  const upArrow = document.getElementById('upArrow');
  const downArrow = document.getElementById('downArrow');
  let upInt, downInt;
  
  function pressUp() {
    up = true;
    upArrow.classList.add('active');
    if (navigator.vibrate) navigator.vibrate(6);
    clearInterval(upInt);
    upInt = setInterval(function() { playerY = Math.max(0, playerY - paddleSpeed * 1.2); }, 16);
  }
  
  function releaseUp() {
    up = false;
    upArrow.classList.remove('active');
    clearInterval(upInt);
  }
  
  function pressDown() {
    down = true;
    downArrow.classList.add('active');
    if (navigator.vibrate) navigator.vibrate(6);
    clearInterval(downInt);
    downInt = setInterval(function() { playerY = Math.min(canvas.height - PH * shortMod, playerY + paddleSpeed * 1.2); }, 16);
  }
  
  function releaseDown() {
    down = false;
    downArrow.classList.remove('active');
    clearInterval(downInt);
  }
  
  var events = ['pointerdown','touchstart','mousedown'];
  for (var i = 0; i < events.length; i++) {
    upArrow.addEventListener(events[i], function(e) { e.preventDefault(); pressUp(); });
    downArrow.addEventListener(events[i], function(e) { e.preventDefault(); pressDown(); });
  }
  
  var eventsEnd = ['pointerup','pointercancel','pointerleave','touchend','touchcancel','mouseup','mouseleave'];
  for (var i = 0; i < eventsEnd.length; i++) {
    upArrow.addEventListener(eventsEnd[i], function(e) { e.preventDefault(); releaseUp(); });
    downArrow.addEventListener(eventsEnd[i], function(e) { e.preventDefault(); releaseDown(); });
  }
  
  upArrow.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  downArrow.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  
  updatePhaseTheme();
  ball = newBall(true);
  
  let frameSkip = 0;
  const FRAME_SKIP_MAX = 1;
  
  function gameLoop() {
    if (!paused && !gameover) {
      frameSkip = (frameSkip + 1) % FRAME_SKIP_MAX;
      if (frameSkip === 0) {
        update();
      }
    }
    draw();
    requestAnimationFrame(gameLoop);
  }
  
  gameLoop();
</script>
</body>
</html>
